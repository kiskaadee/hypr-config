# -----------------------------------------------------
# Active Workspace Rules
# -----------------------------------------------------

# Assigning workspaces to the Samsung 24" (Secondary/Right)
workspace = 1, monitor:HDMI-A-1, default:true
workspace = 3, monitor:HDMI-A-1
workspace = 5, monitor:HDMI-A-1

# Assigning workspaces to the HKM 32" (Primary/Center)
workspace = 2, monitor:DP-1, default:true
workspace = 4, monitor:DP-1
workspace = 6, monitor:DP-1
workspace = 7, monitor:DP-1
workspace = 8, monitor:DP-1
workspace = 9, monitor:DP-1
workspace = 10, monitor:DP-1


# -----------------------------------------------------
# Misc & Input Settings
# -----------------------------------------------------

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    initial_workspace_tracking = 1
    on_focus_under_fullscreen = 1
    allow_session_lock_restore = true
}

input {
    kb_layout = us
    kb_options = compose:ralt
    numlock_by_default = true
    follow_mouse = 1
    mouse_refocus = false
    touchpad {
        natural_scroll = false
        scroll_factor = 1.0 
        disable_while_typing = false
    }
    sensitivity = 0 
}


# -----------------------------------------------------
# Custom Keybindings (No DMS Overlaps)
# -----------------------------------------------------

# === Core Application Launchers ===
bind = SUPER, RETURN, exec, ghostty
bind = SUPER, B, exec, firefox
bind = SUPER, O, exec, obsidian

# === Active Window Management ===
# Quit active window and all open instances
bind = SUPER SHIFT, Q, exec, hyprctl activewindow | grep pid | tr -d 'pid:' | xargs kill 

# === Pixel-Based Window Resizing ===
binde = SUPER ALT, right, resizeactive, 100 0
binde = SUPER ALT, left, resizeactive, -100 0
binde = SUPER ALT, down, resizeactive, 0 100
binde = SUPER ALT, up, resizeactive, 0 -100

# === Workspace Navigation ===
# Open the next empty workspace
bind = SUPER CTRL, E, workspace, empty 

# === Screenshot Utility (Grimshot Pipeline) ===
$screenshot = ~/Scripts/bin/grimshot 
bind = SUPER, S, exec, $screenshot shot_area
bind = SUPER SHIFT, S, exec, $screenshot shot_win
bind = SUPER ALT, S, exec, $screenshot shot_now
bind = SUPER CONTROL, S, exec, $screenshot shot_edit

# === Display Zoom ===
bind = SUPER SHIFT, mouse_down, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') + 0.5}")
bind = SUPER SHIFT, mouse_up, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') - 0.5}")
bind = SUPER SHIFT, Z, exec, hyprctl keyword cursor:zoom_factor 1